name: flutter_high_performance_feed
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  supabase_flutter: ^2.12.4
  cached_network_image: ^3.3.1
  infinite_scroll_pagination: ^4.0.0

  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  envied: ^1.3.4
  go_router: ^17.2.2
  shimmer: ^3.0.0
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.5.4
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  envied_generator: ^1.1.1

flutter:
  uses-material-design: true

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/inter_variable.ttf
          style: normal
          
        - asset: assets/fonts/inter_italic_variable.ttf
          style: italic
